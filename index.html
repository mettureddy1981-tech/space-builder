<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 Space Builder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
color:white;
overflow:hidden;

}

.page{

display:none;

width:100vw;
height:100vh;

justify-content:center;
align-items:center;
flex-direction:column;

}

.active{

display:flex;

}

h1{

font-size:55px;
margin-bottom:20px;
text-shadow:0 0 25px cyan;

}

h2{

margin-bottom:20px;

}

input{

width:320px;

padding:14px;

margin:10px;

border:none;

border-radius:12px;

font-size:18px;

}

button{

padding:14px 24px;

margin:8px;

border:none;

border-radius:12px;

cursor:pointer;

background:#00bfff;

color:white;

font-size:18px;

box-shadow:0 0 15px cyan;

transition:.25s;

}

button:hover{

transform:scale(1.08);

background:#00ffff;

}

#stars{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

overflow:hidden;

z-index:-1;

}

.star{

position:absolute;

background:white;

border-radius:50%;

animation:twinkle 2s infinite alternate;

}

@keyframes twinkle{

from{

opacity:.2;

}

to{

opacity:1;

transform:scale(1.8);

}

}

#topBar{

position:absolute;

top:10px;

left:0;

width:100%;

display:flex;

justify-content:space-between;

padding:15px;

}

#coins{

font-size:22px;

color:gold;

font-weight:bold;

}

#rank{

font-size:20px;

color:cyan;

}

.menu{

display:flex;

flex-wrap:wrap;

justify-content:center;

width:900px;

}

#output{

margin-top:25px;

width:80%;

height:180px;

overflow:auto;

padding:20px;

border-radius:20px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(10px);

}

#planet{

width:500px;

height:500px;

border-radius:50%;

background:radial-gradient(circle,#2a7cff,#001a33);

box-shadow:0 0 60px #2a7cff;

position:relative;

overflow:hidden;

cursor:crosshair;

margin-top:20px;

}

.object{

position:absolute;

transform:translate(-50%,-50%);

font-size:22px;

user-select:none;

}

</style>

</head>

<body>

<div id="stars"></div>

<!-- LOGIN -->

<div id="loginPage" class="page active">

<h1>🌌 SPACE BUILDER</h1>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<input
type="file"
id="profilePicture"
accept="image/*">

<button onclick="login()">

🚀 START GAME

</button>

</div>

<!-- MAIN MENU -->

<div id="menuPage" class="page">

<div id="topBar">

<div id="coins">

⭐ Coins:
<span id="coinValue">100</span>

</div>

<div id="rank">

🌱 Beginner

</div>

<button onclick="saveGame()">

💾 Save

</button>

</div>

<h1>

🚀 SPACE HUB

</h1>

<h2 id="welcome">

</h2>

<div class="menu">

<button onclick="createMenu()">

🌍 Create

</button>

<button onclick="profileMenu()">

👤 Profile

</button>

<button onclick="rankMenu()">

🏆 Ranks

</button>

<button onclick="tutorialMenu()">

📖 Tutorial

</button>

<button onclick="savedMenu()">

💾 Saved Worlds

</button>

<button onclick="multiplayerMenu()">

👥 Multiplayer

</button>

</div>

<div id="output">

Welcome Commander.

</div>

</div>

<!-- CREATE PAGE -->

<div id="createPage"

class="page">

<h1>

🌌 Create

</h1>

<button onclick="planetBuilder()">

🌍 Planet

</button>

<button>

☀ Universe

(Locked)

</button>

<button>

♾ Multiverse

(Locked)

</button>

<button onclick="backMenu()">

⬅ Back

</button>

</div>

<script>

let username="";
let coins=100;
let currentRank="Beginner";

let profileImage="";

const ranks=[
"Beginner",
"Orbital",
"Universal",
"Multiversal",
"Space Explorer"
];

for(let i=0;i<250;i++){

let s=document.createElement("div");

s.className="star";

let size=Math.random()*3+1;

s.style.width=size+"px";
s.style.height=size+"px";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDuration=
(Math.random()*3+2)+"s";
  
enableStarClick(s);
  
document
.getElementById("stars")
.appendChild(s);

}

function login(){

username=
document
.getElementById("username")
.value.trim();

if(username==""){

alert("Enter username");

return;

}

document
.getElementById("loginPage")
.classList
.remove("active");

document
.getElementById("menuPage")
.classList
.add("active");

document
.getElementById("welcome")
.innerHTML=

"Welcome Commander <b>"+username+"</b>";

let file=

document
.getElementById("profilePicture")
.files[0];

if(file){

let reader=new FileReader();

reader.onload=function(){

profileImage=reader.result;

};

reader.readAsDataURL(file);

}

}
// ============================
// SAVE GAME
// ============================

function saveGame(){

let saveData={

username:username,
coins:coins,
rank:currentRank,
profile:profileImage

};

localStorage.setItem(

"spaceBuilderSave",

JSON.stringify(saveData)

);

alert("💾 Game Saved!");

}

// ============================
// CREATE MENU
// ============================

function createMenu(){

document
.getElementById("menuPage")
.classList
.remove("active");

document
.getElementById("createPage")
.classList
.add("active");

}

// ============================
// BACK
// ============================

function backMenu(){

document
.getElementById("createPage")
.classList
.remove("active");

document
.getElementById("menuPage")
.classList
.add("active");

}

// ============================
// PROFILE
// ============================

function profileMenu(){

let text="";

text+="<h2>👤 Profile</h2>";

text+="Username: <b>"+username+"</b><br><br>";

text+="Coins: "+coins+"<br><br>";

text+="Rank: "+currentRank+"<br><br>";

if(profileImage!=""){

text+="<img src='"+profileImage+"' width='150' style='border-radius:50%;border:3px solid cyan;'>";

}

document

.getElementById("output")

.innerHTML=text;

}

// ============================
// RANK MENU
// ============================

function rankMenu(){

let html="<h2>🏆 Space Ranks</h2>";

html+="🌱 Beginner<br>";
html+="🛰 Orbital<br>";
html+="🌎 Universal<br>";
html+="🌌 Multiversal<br>";
html+="🚀 Space Explorer<br>";

document
.getElementById("output")
.innerHTML=html;

}

// ============================
// TUTORIAL
// ============================

function tutorialMenu(){

document
.getElementById("output")
.innerHTML=

`

<h2>📖 Tutorial</h2>

1. Click Create.<br>

2. Choose Planet.<br>

3. Build your world.<br>

4. Earn Space Coins.<br>

5. Complete Quests.<br>

6. Unlock Universe.<br>

7. Unlock Multiverse.<br>

8. Reach Space Explorer.

`;

}

// ============================
// SAVED WORLDS
// ============================

function savedMenu(){

let save=

localStorage.getItem(

"spaceBuilderSave"

);

if(!save){

document

.getElementById("output")

.innerHTML=

"No saved worlds.";

return;

}

let data=

JSON.parse(save);

document

.getElementById("output")

.innerHTML=

`

<h2>💾 Saved Game</h2>

Username:
${data.username}<br><br>

Coins:
${data.coins}<br><br>

Rank:
${data.rank}

`;

}

// ============================
// MULTIPLAYER
// ============================

function multiplayerMenu(){

document

.getElementById("output")

.innerHTML=

`

<h2>

👥 Multiplayer

</h2>

Coming Soon!

<br><br>

Players will join using
invite links.

`;

}

// ============================
// PLANET BUILDER
// ============================

function planetBuilder(){

alert(

"🌍 Planet Builder will open in Part 3."

);

}
// ============================
// PLANET BUILDER (MESSAGE 3)
// ============================

let selectedObj = "🌳";

// OPEN PLANET BUILDER
function planetBuilder(){

document.getElementById("menuPage")
.classList.remove("active");

let planetPage = document.createElement("div");
planetPage.id = "planetPage";
planetPage.className = "page active";

planetPage.innerHTML = `
<h1>🌍 Planet Builder</h1>

<button onclick="setObj('🌳')">Tree</button>
<button onclick="setObj('💧')">Water</button>
<button onclick="setObj('🏔')">Mountain</button>
<button onclick="setObj('🏠')">House</button>
<button onclick="setObj('🌋')">Volcano</button>

<button onclick="exitPlanet()">⬅ Back</button>

<div id="planet" onclick="placeObject(event)"></div>

<div id="output">Click on planet to build your world</div>
`;

document.body.appendChild(planetPage);

}

// SELECT OBJECT
function setObj(obj){
selectedObj = obj;
}

// PLACE OBJECT ON PLANET
function placeObject(e){

let planet = document.getElementById("planet");

let el = document.createElement("div");
el.className = "object";
el.innerHTML = selectedObj;

el.style.left = e.offsetX + "px";
el.style.top = e.offsetY + "px";

planet.appendChild(el);

// earn coins
coins += 5;
document.getElementById("coinValue").innerText = coins;

}

// EXIT PLANET
function exitPlanet(){

document.getElementById("planetPage").remove();

document.getElementById("menuPage")
.classList.add("active");

}

// ============================
// STAR CLICK COINS FIX
// (ADD INSIDE YOUR STAR LOOP)
// ============================

function enableStarClick(star){

star.addEventListener("click", () => {

coins += 1;

document.getElementById("coinValue").innerText = coins;

star.remove();

});

}

// ============================
// LOAD SAVE (AUTO LOAD)
// ============================

let saved = JSON.parse(localStorage.getItem("spaceBuilderSave"));

if(saved){
username = saved.username;
coins = saved.coins;
currentRank = saved.rank || "Beginner";
profileImage = saved.profile || "";
}

// ============================
// COIN POWER SYSTEM
// ============================

let coinPower = saved?.coinPower || 1;

// ============================
// UPDATE COINS DISPLAY
// ============================

function updateCoins(){
document.getElementById("coinValue").innerText = coins;
updateRank();
}

// ============================
// SHOP MENU
// ============================

function shopMenu(){

let html = `
<h2>🏪 Space Shop</h2>

<p>Upgrade your coin power</p>

<button onclick="buyUpgrade1()">💰 Coin x2 (Cost: 50)</button>
<button onclick="buyUpgrade2()">💰 Coin x5 (Cost: 150)</button>

<br><br>
<button onclick="backMenu()">⬅ Back</button>
`;

document.getElementById("output").innerHTML = html;

}

// ============================
// BUY UPGRADES
// ============================

function buyUpgrade1(){

if(coins >= 50){
coins -= 50;
coinPower = 2;
alert("Coin power upgraded x2!");
updateCoins();
}else{
alert("Not enough coins!");
}

}

function buyUpgrade2(){

if(coins >= 150){
coins -= 150;
coinPower = 5;
alert("Coin power upgraded x5!");
updateCoins();
}else{
alert("Not enough coins!");
}

}

// ============================
// STAR CLICK SYSTEM (UPGRADED)
// ============================

function enableStarClick(star){

star.addEventListener("click", () => {

coins += coinPower;
updateCoins();
star.remove();

});

}

// ============================
// SAVE GAME (UPDATED)
// ============================

function saveGame(){

let saveData = {
username: username,
coins: coins,
rank: currentRank,
profile: profileImage,
coinPower: coinPower
};

localStorage.setItem("spaceBuilderSave", JSON.stringify(saveData));

alert("💾 Game Saved!");

}

// ============================
// RANK SYSTEM
// ============================

function updateRank(){

if(coins > 50) currentRank = "Orbital";
if(coins > 150) currentRank = "Universal";
if(coins > 300) currentRank = "Multiversal";
if(coins > 600) currentRank = "Space Explorer";

document.getElementById("rank").innerText = currentRank;

}

// ============================
// AUTO CALL RANK UPDATE
// ============================

updateRank();

// ============================
// WORLD SLOT SYSTEM
// ============================

let worldSlots = JSON.parse(localStorage.getItem("worldSlots")) || {
world1: null,
world2: null,
world3: null
};

let currentWorld = "world1";

// ============================
// SAVE WORLD (MULTI SAVE SYSTEM)
// ============================

function saveWorld(){

let worldData = {
coins: coins,
coinPower: coinPower,
rank: currentRank,
objects: document.getElementById("planet")?.innerHTML || ""
};

worldSlots[currentWorld] = worldData;

localStorage.setItem("worldSlots", JSON.stringify(worldSlots));

alert("🌍 World Saved in " + currentWorld);

}

// ============================
// LOAD WORLD
// ============================

function loadWorld(slot){

let data = worldSlots[slot];

if(!data){
alert("No world found!");
return;
}

currentWorld = slot;

coins = data.coins || 0;
coinPower = data.coinPower || 1;
currentRank = data.rank || "Beginner";

updateCoins();

setPlanetData(data.objects || "");

alert("🌍 Loaded " + slot);

}

// ============================
// MULTIPLE PLANETS
// ============================

let planets = [
"Earth Base",
"Moon Colony",
"Mars City"
];

let currentPlanet = 0;

// ============================
// SPACE TRAVEL
// ============================

function spaceTravel(){

currentPlanet++;

if(currentPlanet >= planets.length){
currentPlanet = 0;
}

document.getElementById("output").innerHTML =
"🚀 Traveling to: " + planets[currentPlanet];

alert("🚀 Arrived at " + planets[currentPlanet]);

}

// ============================
// NPC SYSTEM
// ============================

let npcs = [];

function spawnNPC(){

let npc = {
name: "Alien " + Math.floor(Math.random()*1000),
mood: "happy"
};

npcs.push(npc);

alert("👽 NPC Spawned: " + npc.name);

}

function showNPCs(){

let html = "<h2>👽 NPC List</h2>";

if(npcs.length === 0){
html += "No NPCs yet.";
}

npcs.forEach(n => {
html += "👽 " + n.name + " - " + n.mood + "<br>";
});

document.getElementById("output").innerHTML = html;

}

// ============================
// QUEST SYSTEM
// ============================

let quests = [
"Collect 50 coins",
"Build 5 objects on planet",
"Spawn 3 NPCs"
];

let completedQuests = [];

function showQuests(){

let html = "<h2>🎯 Missions</h2>";

quests.forEach(q => {
html += "• " + q + "<br>";
});

document.getElementById("output").innerHTML = html;

}

function completeQuest(){

if(quests.length === 0){
alert("No quests left!");
return;
}

let q = quests.shift();
completedQuests.push(q);

coins += 20;
updateCoins();

alert("🎯 Quest completed: " + q);

}

// ============================
// PLANET SAVE HELPERS
// ============================

function getPlanetData(){

let planet = document.getElementById("planet");

if(!planet) return "";

return planet.innerHTML;

}

function setPlanetData(data){

let planet = document.getElementById("planet");

if(planet){
planet.innerHTML = data;
}

}

// ============================
// AUTO SAVE SYSTEM
// ============================

setInterval(() => {

worldSlots[currentWorld] = {
coins,
coinPower,
rank: currentRank,
objects: getPlanetData()
};

localStorage.setItem("worldSlots", JSON.stringify(worldSlots));

}, 10000);

// ============================
// SPACESHIP SYSTEM
// ============================

let ship = {
x: 200,
y: 200,
speed: 10
};

// Create spaceship UI if not exists
function createShip(){

if(document.getElementById("ship")) return;

let s = document.createElement("div");
s.id = "ship";
s.innerHTML = "🚀";

s.style.position = "absolute";
s.style.fontSize = "30px";
s.style.left = ship.x + "px";
s.style.top = ship.y + "px";

document.body.appendChild(s);

}

// ============================
// MOVE SHIP
// ============================

document.addEventListener("keydown", (e) => {

createShip();

let el = document.getElementById("ship");
if(!el) return;

if(e.key === "ArrowUp") ship.y -= ship.speed;
if(e.key === "ArrowDown") ship.y += ship.speed;
if(e.key === "ArrowLeft") ship.x -= ship.speed;
if(e.key === "ArrowRight") ship.x += ship.speed;

el.style.left = ship.x + "px";
el.style.top = ship.y + "px";

});

// ============================
// GALAXY MAP SYSTEM
// ============================

let galaxyPlanets = [
{ name: "Earth Base", x: 100, y: 200 },
{ name: "Moon Colony", x: 300, y: 120 },
{ name: "Mars City", x: 500, y: 300 }
];

// ============================
// OPEN GALAXY MAP
// ============================

function openGalaxy(){

let html = "<h2>🌌 Galaxy Map</h2>";

html += "<div style='position:relative;width:600px;height:400px;background:#000;border:2px solid cyan;'>";

galaxyPlanets.forEach(p => {

html += `
<div onclick="warpTo('${p.name}')"
style="
position:absolute;
left:${p.x}px;
top:${p.y}px;
cursor:pointer;
color:white;
font-size:20px;
">
🪐 ${p.name}
</div>
`;

});

html += "</div>";

document.getElementById("output").innerHTML = html;

}

// ============================
// WARP TO PLANET
// ============================

function warpTo(name){

currentPlanet = name;

document.getElementById("output").innerHTML =
"🚀 Warped to " + name;

alert("🌌 Entering " + name);

}

// ============================
// AUTO SHIP COINS (TRAVEL BONUS)
// ============================

setInterval(() => {

if(document.getElementById("ship")){

coins += 1;
updateCoins();

}

}, 5000);

// ============================
// NPC WALKING AI SYSTEM
// ============================

function startNPCMovement(){

setInterval(() => {

npcs.forEach(npc => {

// random movement logic
npc.x = (npc.x || Math.random()*300) + (Math.random()*20 - 10);
npc.y = (npc.y || Math.random()*300) + (Math.random()*20 - 10);

});

}, 2000);

}

startNPCMovement();

// ============================
// RANDOM SPACE EVENTS
// ============================

let events = [
"Meteor Shower ☄️",
"Alien Trade 👽",
"Solar Storm 🌞",
"Space Treasure Found 💰"
];

// trigger random event
function triggerEvent(){

let event = events[Math.floor(Math.random()*events.length)];

if(event === "Meteor Shower ☄️"){
coins += 10;
alert("☄️ Meteor Shower! You collected space minerals +10 coins");
}

if(event === "Alien Trade 👽"){
coins += 20;
alert("👽 Alien Trade! You earned 20 coins");
}

if(event === "Solar Storm 🌞"){
coins -= 10;
alert("🌞 Solar Storm! You lost 10 coins");
}

if(event === "Space Treasure Found 💰"){
coins += 50;
alert("💰 Space Treasure Found! +50 coins");
}

updateCoins();

}

// ============================
// RANDOM EVENT SYSTEM LOOP
// ============================

setInterval(() => {

triggerEvent();

}, 15000);

// ============================
// NPC INTERACTION SYSTEM
// ============================

function talkToNPC(){

if(npcs.length === 0){
alert("No NPCs found!");
return;
}

let npc = npcs[Math.floor(Math.random()*npcs.length)];

let replies = [
"Hello traveler!",
"We come in peace.",
"The galaxy is large...",
"Trade with us?"
];

let reply = replies[Math.floor(Math.random()*replies.length)];

alert(npc.name + " says: " + reply);

}

// ============================
// NPC SPAWN IMPROVEMENT
// ============================

function spawnNPC(){

let npc = {
name: "Alien " + Math.floor(Math.random()*999),
mood: "neutral",
x: Math.random()*400,
y: Math.random()*400
};

npcs.push(npc);

alert("👾 NPC Spawned: " + npc.name);

}

// ============================
// NPC LIFE SYSTEM (HUNGER + MOOD)
// ============================

function updateNPCLife(){

npcs.forEach(npc => {

// hunger increases over time
npc.hunger = (npc.hunger || 0) + 1;

// mood changes based on hunger
if(npc.hunger > 10){
npc.mood = "angry";
}
if(npc.hunger > 20){
npc.mood = "weak";
}

// reset if fed
if(npc.fed){
npc.hunger = 0;
npc.mood = "happy";
npc.fed = false;
}

});

}

// run life system
setInterval(updateNPCLife, 5000);

// ============================
// FEED NPC SYSTEM
// ============================

function feedNPC(){

if(npcs.length === 0){
alert("No NPCs to feed!");
return;
}

let npc = npcs[Math.floor(Math.random()*npcs.length)];

npc.fed = true;

coins -= 5;
updateCoins();

alert("🍎 You fed " + npc.name);

}

// ============================
// SPACE COMBAT SYSTEM
// ============================

let enemies = [];

function spawnEnemy(){

let enemy = {
name: "Void Beast " + Math.floor(Math.random()*999),
hp: 50
};

enemies.push(enemy);

alert("⚔️ Enemy Appeared: " + enemy.name);

}

// ============================
// ATTACK SYSTEM
// ============================

function attackEnemy(){

if(enemies.length === 0){
alert("No enemies!");
return;
}

let enemy = enemies[0];

enemy.hp -= 20;

alert("💥 You attacked " + enemy.name + " (-20 HP)");

if(enemy.hp <= 0){
alert("🏆 Enemy defeated!");
coins += 30;
updateCoins();
enemies.shift();
}

}

// ============================
// DEFENSE SYSTEM
// ============================

function defend(){

alert("🛡️ Shield Activated!");

coins += 5;
updateCoins();

}

// ============================
// RANDOM BOSS EVENTS
// ============================

setInterval(() => {

if(Math.random() < 0.3){

spawnEnemy();

}

}, 20000);

// ============================
// MISSION WIN/LOSE SYSTEM
// ============================

function checkMissions(){

if(coins >= 200 && npcs.length >= 2){

alert("🏆 Mission Complete! You built a thriving galaxy!");
coins += 50;
updateCoins();

}

if(coins < 0){

alert("💀 Mission Failed! You lost your space base...");
coins = 50;
updateCoins();

}

}

// run mission check loop
setInterval(checkMissions, 7000);

// ============================
// NPC STATUS VIEW
// ============================

function showNPCStatus(){

let html = "<h2>🧠 NPC Status</h2>";

if(npcs.length === 0){
html += "No NPCs.";
}

npcs.forEach(n => {

html += `
👾 ${n.name}<br>
Mood: ${n.mood}<br>
Hunger: ${n.hunger || 0}<br><br>
`;

});

document.getElementById("output").innerHTML = html;

}

// ============================
// 🌌 ANIMATED GALAXY BACKGROUND (MOVING STARS)
// ============================

function createMovingGalaxy(){

for(let i=0;i<120;i++){

let star = document.createElement("div");
star.className = "star";

let size = Math.random()*3+1;

star.style.width = size + "px";
star.style.height = size + "px";

star.style.left = Math.random()*100 + "vw";
star.style.top = Math.random()*100 + "vh";

document.body.appendChild(star);

// movement
setInterval(() => {

let x = parseFloat(star.style.left);
star.style.left = (x + Math.random()*2 - 1) + "px";

}, 100);

}

}

createMovingGalaxy();

// ============================
// 🚀 IMPROVED SPACESHIP PHYSICS
// ============================

let velocity = {x:0, y:0};
let friction = 0.95;

document.addEventListener("keydown", (e) => {

createShip();

let el = document.getElementById("ship");
if(!el) return;

if(e.key === "ArrowUp") velocity.y -= 2;
if(e.key === "ArrowDown") velocity.y += 2;
if(e.key === "ArrowLeft") velocity.x -= 2;
if(e.key === "ArrowRight") velocity.x += 2;

});

// smooth movement loop
setInterval(() => {

let el = document.getElementById("ship");
if(!el) return;

ship.x += velocity.x;
ship.y += velocity.y;

velocity.x *= friction;
velocity.y *= friction;

el.style.left = ship.x + "px";
el.style.top = ship.y + "px";

}, 30);

// ============================
// 🌌 GALAXY MAP UPGRADE
// ============================

function openGalaxy(){

let html = "<h2>🌌 Galaxy Navigation</h2>";

html += "<div style='position:relative;width:600px;height:400px;background:black;border:2px solid cyan;'>";

galaxyPlanets.forEach(p => {

html += `
<div onclick="warpTo('${p.name}')"
style="
position:absolute;
left:${p.x}px;
top:${p.y}px;
cursor:pointer;
color:yellow;
font-size:18px;
">
🪐 ${p.name}
</div>
`;

});

html += "</div>";

html += "<br><button onclick='backMenu()'>⬅ Back</button>";

document.getElementById("output").innerHTML = html;

}

// ============================
// 🌌 ANIMATED GALAXY BACKGROUND (MOVING STARS)
// ============================

function createMovingGalaxy(){

for(let i=0;i<120;i++){

let star = document.createElement("div");
star.className = "star";

let size = Math.random()*3+1;

star.style.width = size + "px";
star.style.height = size + "px";

star.style.left = Math.random()*100 + "vw";
star.style.top = Math.random()*100 + "vh";

document.body.appendChild(star);

// movement
setInterval(() => {

let x = parseFloat(star.style.left);
star.style.left = (x + Math.random()*2 - 1) + "px";

}, 100);

}

}

createMovingGalaxy();
