<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 Space Builder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="stars"></div>

<!-- LOGIN PAGE -->

<div id="loginPage" class="page active">

<h1>🌌 SPACE BUILDER</h1>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<input
id="profilePicture"
type="file"
accept="image/*">

<button onclick="login()">

🚀 START GAME

</button>

</div>

<!-- MAIN MENU -->

<div
id="menuPage"
class="page">

<div id="topBar">

<div>

⭐ Coins:
<span id="coinValue">

10

</span>

</div>

<div>

🏆
<span id="rankValue">

Beginner

</span>

</div>

<button onclick="saveGame()">

💾 Save

</button>

</div>

<h1>

🚀 SPACE HUB

</h1>

<h2 id="welcome">

</h2>

<div class="menu">

<button onclick="createMenu()">

🌍 Create

</button>

<button onclick="profileMenu()">

👤 Profile

</button>

<button onclick="rankMenu()">

🏆 Space Rank

</button>

<button onclick="tutorialMenu()">

📖 Tutorial

</button>

<button onclick="savedMenu()">

💾 Saved Worlds

</button>

<button onclick="multiplayerMenu()">

👥 Multiplayer

</button>

</div>

<div id="output">

Welcome Commander.

</div>

<script src="script.js">
  
</script>
