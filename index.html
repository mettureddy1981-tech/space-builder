<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Builder</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

/* Pages */
.page {
  display: none;
  padding: 20px;
}

/* Simple UI box */
.box {
  border: 1px solid #444;
  padding: 10px;
  margin: 10px 0;
}

/* Buttons */
button {
  padding: 8px 12px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- ================= MENU PAGE ================= -->
<div id="menuPage" class="page">

  <h1>🌌 Space Builder</h1>

  <div class="box">
    💰 Coins: <span id="coinValue">0</span><br>
    🏆 Rank: <span id="rankValue">Beginner</span>
  </div>

  <button onclick="showPage('planetPage')">🪐 Go to Planet</button>
  <button onclick="showPage('questPage')">🎯 Quests</button>
  <button onclick="showPage('npcPage')">👽 NPCs</button>
  <button onclick="analyzeGame()">🔍 Analyze Game</button>

  <div class="box">
    <button onclick="saveWorld()">💾 Save World</button>
    <button onclick="loadWorld('world1')">Load World 1</button>
    <button onclick="loadWorld('world2')">Load World 2</button>
    <button onclick="loadWorld('world3')">Load World 3</button>
  </div>

</div>

<!-- ================= PLANET PAGE ================= -->
<div id="planetPage" class="page">

  <h2>🪐 Planet Builder</h2>

  <div class="box">
    <div id="planet">🌍 Your planet starts here</div>
  </div>

  <button onclick="addCoins(10)">💰 Mine Coins</button>
  <button onclick="spaceTravel()">🚀 Travel Planet</button>

  <button onclick="showPage('menuPage')">⬅ Back</button>

</div>

<!-- ================= QUEST PAGE ================= -->
<div id="questPage" class="page">

  <h2>🎯 Quests</h2>

  <button onclick="showQuests()">Show Quests</button>
  <button onclick="completeQuest()">Complete Quest</button>

  <div id="output" class="box"></div>

  <button onclick="showPage('menuPage')">⬅ Back</button>

</div>

<!-- ================= NPC PAGE ================= -->
<div id="npcPage" class="page">

  <h2>👽 NPC System</h2>

  <button onclick="spawnNPC()">Spawn NPC</button>
  <button onclick="showNPCs()">Show NPCs</button>

  <div id="output" class="box"></div>

  <button onclick="showPage('menuPage')">⬅ Back</button>

</div>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
